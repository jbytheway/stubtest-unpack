name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: make-venv
        run: python3 -m venv .venv
      - name: install
        run: ./.venv/bin/pip install mypy .
      - name: run mypy
        run: ./.venv/bin/mypy python
      - name: run stubtest
        run: ./.venv/bin/stubtest stubtest_unpack._rust

