name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      #- name: Build wheels
      #  uses: PyO3/maturin-action@v1
      #  with:
      #    target: ${{ matrix.platform.target }}
      #    args: --release --out dist --find-interpreter
      #    sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      #    manylinux: auto
      - name: mypy
        shell: bash
        run:
          - python3 -m venv .venv
          - ./.venv/bin/pip install mypy .
          - ./.venv/bin/mypy python
          - ./.venv/bin/stubtest stubtest_unpack._rust

